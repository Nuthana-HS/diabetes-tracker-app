default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: diabetes_tracker_development
  username: postgres
  password: postgres
  host: localhost
  port: 5432

test:
  <<: *default
  database: backend_test

production:
  <<: *default